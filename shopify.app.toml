# Shopify App Configuration
# This file defines settings for the Shopify CLI integration and deployment

client_id = "mock_client_id_12345"
name = "Regional Pricing Estimator"
handle = "regional-pricing-estimator"
application_url = "http://localhost:3000"
embedded = true

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
topics = [ "app/uninstalled" ]
uri = "/api/webhooks"

[auth]
redirect_urls = [
  "http://localhost:3000/api/auth/callback"
]

[scopes]
# Only needs standard storefront & products read permissions
scopes = "read_products"

# App Proxy configuration to route storefront requests through Shopify securely
[app_proxy]
url = "http://localhost:3000/api/estimate-shipping"
subpath = "shipping-estimator"
prefix = "apps"
